<!DOCTYPE html>
<html lang="sw">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — SHTL Admin</title>
    <link rel="stylesheet" href="css/admin-app.css" />
  </head>
  <body class="admin-app">
    <aside class="admin-sidebar" id="admin-sidebar"></aside>
    <div class="admin-main">
      <div class="admin-main-inner">
        <h1 class="admin-page-title">Dashboard</h1>
        <div class="admin-banner">
          Mfumo wa ndani: ripoti za madereva —
          <a href="pakua-excel.html">Pakua Excel</a> (muundo sawa na spreadsheet ya kampuni).
          Ufuatiliaji wa gari kwenye
          <a href="https://www.strack.co.tz/" target="_blank" rel="noopener noreferrer">Strack</a>
          (tovuti ya nje).
        </div>

        <div class="admin-stats">
          <div class="admin-stat-card admin-stat-card--green">
            <div>
              <span class="admin-stat-card__text">Madereva hai (si dropped)</span>
              <span class="admin-stat-card__value" id="stat-active-drivers">0</span>
            </div>
            <span class="material-symbols-outlined" aria-hidden="true">groups</span>
          </div>
          <div class="admin-stat-card admin-stat-card--yellow">
            <div>
              <span class="admin-stat-card__text">Jumla ya incharge</span>
              <span class="admin-stat-card__value" id="stat-incharges">0</span>
            </div>
            <span class="material-symbols-outlined" aria-hidden="true">supervisor_account</span>
          </div>
          <div class="admin-stat-card admin-stat-card--orange">
            <div>
              <span class="admin-stat-card__text">Dropped drivers</span>
              <span class="admin-stat-card__value" id="stat-dropped">0</span>
            </div>
            <span class="material-symbols-outlined" aria-hidden="true">person_off</span>
          </div>
          <div class="admin-stat-card admin-stat-card--blue">
            <div>
              <span class="admin-stat-card__text">Lori (madereva hai)</span>
              <span class="admin-stat-card__value" id="stat-trucks">0</span>
            </div>
            <span class="material-symbols-outlined" aria-hidden="true">airport_shuttle</span>
          </div>
        </div>
      </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-shell.js"></script>
    <script>
      (function () {
        if (!window.SHTLAuth.requireAuth("index.html")) return;
        window.SHTLAdminShell.render("dashboard");

        var drivers = window.SHTL.getDrivers();
        var incharges = window.SHTL.getIncharges();
        var hai = drivers.filter(function (d) {
          return !d.dropped;
        });
        var dropped = drivers.filter(function (d) {
          return !!d.dropped;
        });
        var withTruck = hai.filter(function (d) {
          return (d.truckNumber || "").trim().length > 0;
        }).length;

        document.getElementById("stat-active-drivers").textContent = String(hai.length);
        document.getElementById("stat-incharges").textContent = String(incharges.length);
        document.getElementById("stat-dropped").textContent = String(dropped.length);
        document.getElementById("stat-trucks").textContent = String(withTruck);
      })();
    </script>
  </body>
</html>
